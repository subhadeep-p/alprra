<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <rect width="400" height="300" fill="#FDFAF4"/>
  <!-- Cake shape -->
  <rect x="100" y="140" width="200" height="80" rx="8" fill="#C89A5A"/>
  <rect x="100" y="100" width="200" height="60" rx="8" fill="#D0AA6A"/>
  <rect x="100" y="92" width="200" height="20" rx="8" fill="#E8C07A"/>
