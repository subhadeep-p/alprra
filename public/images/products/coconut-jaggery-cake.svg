  <line x1="130" y1="92" x2="145" y2="86" stroke="white" stroke-width="3" stroke-linecap="round"/>
  <line x1="160" y1="88" x2="172" y2="83" stroke="white" stroke-width="3" stroke-linecap="round"/>
  <line x1="190" y1="86" x2="200" y2="82" stroke="white" stroke-width="3" stroke-linecap="round"/>
  <line x1="220" y1="88" x2="232" y2="83" stroke="white" stroke-width="3" stroke-linecap="round"/>
